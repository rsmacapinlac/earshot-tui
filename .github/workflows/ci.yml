name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Go vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1
      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2024.1.1"
          install-go: false
